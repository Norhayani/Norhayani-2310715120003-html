<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajian Data - Tema Maroon</title>
    <style>
        /* CSS INTERNAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background-color: #800000; /* Maroon */
            color: white;
            padding: 2.5rem 1rem;
            text-align: center;
            border-bottom: 5px solid #4a0000;
        }
        nav {
            background-color: #4a0000;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            padding: 1rem 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        nav a:hover {
            background-color: #800000;
        }
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #800000;
            margin-bottom: 1rem;
            font-size: 2rem;
        }
        .description {
            margin-bottom: 2rem;
            color: #666;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        /* Tombol Utama */
        .btn-data {
            display: inline-block;
            background-color: #800000;
            color: white;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.3);
            margin-bottom: 3rem;
            border: 2px solid #800000;
        }
        .btn-data:hover {
            background-color: #fff;
            color: #800000;
            transform: translateY(-3px);
        }

        /* Iframe Container */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* Rasio 4:3 */
            border: 4px solid #800000;
            border-radius: 10px;
            overflow: hidden;
            background: #eee;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background-color: #800000;
            color: white;
            margin-top: 4rem;
        }
        @media (max-width: 768px) {
            nav a { padding: 0.8rem 1rem; font-size: 0.75rem; }
            .container { margin: 1rem; padding: 1.5rem; }
            .iframe-container { padding-top: 150%; } /* Lebih tinggi di mobile */
        }
    </style>
</head>
<body>
    <header>
        <h1>VISUALISASI & SAJIAN DATA</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="sajiandata.html" style="background-color: #800000;">Sajian Data</a>
    </nav>
    <div class="container">
        <h2>Dashboard Laporan</h2>
        <p class="description">
            Halaman ini menyajikan data statistik secara interaktif menggunakan Google Data Studio. 
            Klik tombol di bawah untuk membuka laporan dalam mode layar penuh.
        </p>
        <!-- Link Reporting yang diminta -->
        <a href="https://datastudio.google.com/reporting/4f8afae0-c417-47b2-b08e-6314c203bb9d" target="_blank" class="btn-data">
            BUKA LAPORAN SEKARANG
        </a>
        <div class="iframe-container">
            <!-- Menggunakan link embed untuk tampilan pratinjau langsung -->
            <iframe src="https://datastudio.google.com/embed/reporting/4f8afae0-c417-47b2-b08e-6314c203bb9d" allowfullscreen></iframe>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Nama Anda | Tema Maroon Elegan</p>
    </footer>
</body>
</html>
