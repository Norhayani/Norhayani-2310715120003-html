<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed Google Form & Spreadsheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-top: 30px;
        }
        h2:first-of-type {
            margin-top: 0;
        }
        .embed-wrapper {
            margin-bottom: 30px;
        }
        iframe {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="embed-wrapper">
        <h2>Google Form</h2>
        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSdZJIHfw-c40O72GHYrbWOUzy5qVVih46SMIdwIkBCL3ZDeIA/viewform?embedded=true" 
            height="800" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0">
            Memuatkan...
        </iframe>
    </div>

    <div class="embed-wrapper">
        <h2>Google Spreadsheet</h2>
        <iframe 
            src="https://docs.google.com/spreadsheets/d/1vFggRM9I6vVPaXAVsrxmiOJ1Teul_PiFi3D4lcFcuDk/preview" 
            height="500" 
            frameborder="0">
            Memuatkan...
        </iframe>
    </div>

</div>

</body>
</html>
