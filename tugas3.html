<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 3 - Formulir Data</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f9f9f9; color: #333; line-height: 1.6; }
        header { background-color: #800000; color: white; padding: 2rem 1rem; text-align: center; }
        nav { background-color: #4a0000; display: flex; justify-content: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; padding: 1rem 1.5rem; text-decoration: none; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; }
        nav a:hover { background-color: #a52a2a; }
        
        .container { max-width: 800px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #800000; border-bottom: 2px solid #800000; margin-bottom: 1.5rem; padding-bottom: 5px; }
        h3 { color: #4a0000; margin: 1.5rem 0 1rem 0; font-size: 1.2rem; background: #fff5f5; padding: 5px 10px; border-left: 4px solid #800000; }
        
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="number"], input[type="date"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem;
        }
        
        /* Style untuk Button Jenis Transaksi */
        .transaction-type { display: flex; gap: 10px; margin-top: 5px; }
        .radio-btn { flex: 1; text-align: center; }
        .radio-btn input { display: none; }
        .radio-btn label {
            display: block; padding: 10px; background: #eee; border: 2px solid #ddd; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .radio-btn input:checked + label.debet-label { background: #800000; color: white; border-color: #4a0000; }
        .radio-btn input:checked + label.kredit-label { background: #a52a2a; color: white; border-color: #800000; }

        .btn-submit {
            display: block; width: 100%; background-color: #800000; color: white; padding: 1rem;
            border: none; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 2rem;
        }
        .btn-submit:hover { background-color: #4a0000; }

        footer { text-align: center; padding: 1.5rem; background-color: #800000; color: white; margin-top: 3rem; }
    </style>
</head>
<body>

<header>
    <h1>TUGAS 3: FORMULIR INPUT</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="biodata.html">Biodata</a>
    <a href="galeri.html">Galeri</a>
    <a href="tugas3.html">Tugas 3</a>
    <a href="sajiandata.html">Sajian Data</a>
</nav>

<div class="container">
    <form id="dataForm">
        <h2>Formulir Pengumpulan Data</h2>

        <h3>Data Demografi</h3>
        <div class="form-group">
            <label>Nama Pengguna</label>
            <input type="text" name="nama" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir</label>
            <input type="date" name="tgl_lahir" required>
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea name="alamat" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Pendidikan</label>
            <input list="pendidikan-list" name="pendidikan" placeholder="Cari/Pilih Pendidikan...">
            <datalist id="pendidikan-list">
                <option value="SD">
                <option value="SMP">
                <option value="SMA/SMK">
                <option value="D3 - Diploma">
                <option value="S1 - Sarjana">
                <option value="S2 - Magister">
            </datalist>
        </div>

        <h3>Data Bank</h3>
        <div class="form-group">
            <label>Nama Bank</label>
            <input list="bank-list" name="bank" placeholder="Cari Bank...">
            <datalist id="bank-list">
                <option value="BCA">
                <option value="BNI">
                <option value="BRI">
                <option value="Mandiri">
                <option value="BSI">
            </datalist>
        </div>
        <div class="form-group">
            <label>Nomor Rekening</label>
            <input type="number" name="rekening">
        </div>

        <h3>Data Transaksi Keuangan</h3>
        <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" name="tgl_transaksi">
        </div>
        <div class="form-group">
            <label>Uraian Transaksi</label>
            <input type="text" name="uraian">
        </div>
        <div class="form-group">
            <label>Jenis Transaksi</label>
            <div class="transaction-type">
                <div class="radio-btn">
                    <input type="radio" id="type-debet" name="jenis_transaksi" value="Debet" checked>
                    <label for="type-debet" class="debet-label">DEBET</label>
                </div>
                <div class="radio-btn">
                    <input type="radio" id="type-kredit" name="jenis_transaksi" value="Kredit">
                    <label for="type-kredit" class="kredit-label">KREDIT</label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">Kirim Data ke Sheets</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 Norhayani - Dibuat dengan &hearts;</p>
</footer>

</body>
</html>
