<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajian Data Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn-trigger {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }
        .btn-trigger:hover {
            background-color: #4338ca;
        }
        .link-container {
            margin-top: 20px;
            display: none; /* Tersembunyi di awal */
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.4s ease forwards;
        }
        .data-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s, opacity 0.2s;
        }
        .data-link:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .looker {
            background-color: #4285F4; /* Warna khas Google/Looker */
        }
        .spreadsheet {
            background-color: #0F9D58; /* Warna khas Google Sheets */
        }
        /* Efek animasi muncul */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Sajian Data Utama</h2>
    <p>Klik tombol di bawah untuk melihat visualisasi report dan data mentah.</p>
    <button class="btn-trigger" id="toggleBtn" onclick="toggleDataLinks()">Tampilkan Sumber Data</button>
    <div id="linkContainer" class="link-container">
        <a href="https://datastudio.google.com/embed/reporting/8bda613c-edf9-4f2a-ab60-513dcb0a03dd/page/page_12345" target="_blank" class="data-link looker">
            📊 Buka Looker Studio Report
        </a>
        <a href="https://docs.google.com/spreadsheets/d/18P98-diYqBhBCLzZ6r22-vtF4YPBeEvw2GKEYaA2FQA/edit?usp=sharing" target="_blank" class="data-link spreadsheet">
            🟢 Buka Data Spreadsheet
        </a>
    </div>
</div>
<script>
    function toggleDataLinks() {
        var container = document.getElementById("linkContainer");
        var button = document.getElementById("toggleBtn");
        if (container.style.display === "none" || container.style.display === "") {
            container.style.display = "flex";
            button.textContent = "Sembunyikan Sumber Data";
            button.style.backgroundColor = #6b7280; /* Berubah jadi abu-abu saat aktif */
        } else {
            container.style.display = "none";
            button.textContent = "Tampilkan Sumber Data";
            button.style.backgroundColor = "#4f46e5"; /* Kembali ke warna awal */
        }
    }
</script>
</body>
</html>
