<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajian Data - Tema Maroon</title>
    <style>
        /* CSS INTERNAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }
        header {
            background-color: #800000; /* Maroon */
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        nav {
            background-color: #4a0000; /* Maroon Gelap */
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            padding: 1rem 1.5rem;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        nav a:hover {
            background-color: #a52a2a;
        }
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #800000;
            margin-bottom: 1rem;
        }
        .desc {
            margin-bottom: 2rem;
            color: #666;
        }
        /* Desain Tombol Akses */
        .btn-link {
            display: inline-block;
            background-color: #800000;
            color: white;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.2);
            margin-bottom: 2.5rem;
        }
        .btn-link:hover {
            background-color: #4a0000;
            transform: scale(1.05);
        }
        /* Frame Pembungkus agar Responsif */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* Rasio aspek laporan */
            overflow: hidden;
            border: 4px solid #800000;
            border-radius: 8px;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #800000;
            color: white;
            margin-top: 3rem;
        }
        @media (max-width: 600px) {
            nav { flex-direction: column; text-align: center; }
            .iframe-container { padding-top: 150%; /* Lebih memanjang di HP */ }
        }
    </style>
</head>
<body>
    <header>
        <h1>DASHBOARD SAJIAN DATA</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="video.html">Video</a>
        <a href="tugas3.html">Tugas 3</a>
        <a href="sajiandata.html">Sajian Data</a>
    </nav>
    <div class="container">
        <h2>Laporan Statistik Interaktif</h2>
        <p class="desc">Klik tombol di bawah ini untuk melihat laporan dalam mode layar penuh, atau jelajahi data langsung melalui jendela di bawah.</p>
        <a href="https://datastudio.google.com/embed/reporting/8bda613c-edf9-4f2a-ab60-513dcb0a03dd/page/page_12345" target="_blank" class="btn-link">
            BUKA LAPORAN DI TAB BARU
        </a>
        <div class="iframe-container">
            <iframe src="https://datastudio.google.com/embed/reporting/8bda613c-edf9-4f2a-ab60-513dcb0a03dd/page/page_12345" allowfullscreen></iframe>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Nama Anda - Data Visualization Project</p>
    </footer>

</body>
</html>
