<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajian Data GitHub</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 650px;
        }

        h2 { color: #333; margin-top: 0; }
        p { color: #666; margin-bottom: 25px; }

        .btn-tampilkan {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-tampilkan:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        #data-container {
            margin-top: 20px;
            display: none; /* Tersembunyi di awal */
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsivitas Iframe */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 75%; /* Menjaga aspek rasio 600:450 */
            height: 0;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Visualisasi Data</h2>
        <p>Klik tombol di bawah untuk memuat dashboard interaktif.</p>
        
        <button class="btn-tampilkan" onclick="showData()">Tampilkan Sajian Data</button>

        <div id="data-container">
            <div class="iframe-wrapper">
                <!-- Iframe Pesanan Anda -->
                <iframe 
                    width="600" 
                    height="450" 
                    src="https://datastudio.google.com/embed/reporting/8bda613c-edf9-4f2a-ab60-513dcb0a03dd/page/page_12345" 
                    frameborder="0" 
                    style="border:0" 
                    allowfullscreen 
                    sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        function showData() {
            var container = document.getElementById("data-container");
            var button = document.querySelector(".btn-tampilkan");
            
            // Menampilkan kontainer iframe
            container.style.display = "block";
            // Menyembunyikan tombol setelah diklik (opsional)
            button.style.display = "none";
        }
    </script>

</body>
</html>
