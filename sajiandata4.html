<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajian Data Interaktif</title>
    <style>
        /* Gaya dasar halaman */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        /* Container agar iframe responsif */
        .video-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 75%; /* Rasio 4:3 (sesuai 600x450) */
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard Penyajian Data</h1>
        <p>Gunakan kontrol di dalam laporan untuk memfilter atau mengeksplorasi data.</p>

        <div class="video-container">
            <iframe 
                src="https://datastudio.google.com/embed/reporting/8bda613c-edf9-4f2a-ab60-513dcb0a03dd/page/page_12345" 
                frameborder="0" 
                style="border:0" 
                allowfullscreen 
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
            </iframe>
        </div>
        <div class="footer">
            Dihosting melalui GitHub Pages
        </div>
    </div>
</body>
</html>
